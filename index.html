const CriteriaExplorer = () => {

  const lvCrits  = CRIT.filter(c => c[1] === activeLv);

      <div className="bg-slate-900 px-8 py-6">

          const lc   = LVL_CFG[lv];

          const sn   = SEUILS_N[lv];

              className={`flex-1 py-4 px-2 text-xs font-bold border-b-2 transition-all tab-btn flex flex-col items-center gap-1

              <div className="flex items-center gap-1.5">
                <i className={`fa-solid ${lc.icon}`}></i>
                <span className="hidden sm:inline">Niveau {lv}</span>
                <span className="sm:hidden">{lv}</span>
              </div>
              <span className="text-slate-400 font-normal">{cnt} critères · {sn} seuils</span>
            </button>
          );
        })}
      </div>

      {/* Level description */}
      <div className={`px-6 py-4 ${LVL_CFG[activeLv].lightCls} border-b border-slate-100`}>
        <p className="text-sm text-slate-600 leading-relaxed">{LVL_DESC[activeLv]}</p>

      <div className="divide-y divide-slate-100">

          const isOpen   = openCat === cat.id;
          const seuilCnt = cat.items.filter(c => c[3]).length;
          return (
            <div key={cat.id}>
              <button

                <div className="flex-1">
                  <span className="font-bold text-sm text-slate-800">{cat.name}</span>
                  <span className="text-xs text-slate-400 ml-2">{cat.items.length} critères · {seuilCnt} seuils</span>
                </div>
                <i className={`fa-solid fa-chevron-${isOpen ? 'up' : 'down'} text-slate-300 text-xs flex-shrink-0`}></i>
              </button>

              {isOpen && (
                <div className="pb-3 px-6 pl-16 accordion-body space-y-1.5">
                  {cat.items.map((cr, idx) => (
                    <div key={idx} className={`crit-row flex items-start gap-2.5 px-3 py-2 rounded-xl ${cr[3] ? cat.light : ''}`}>

                      <div className="flex gap-0.5 flex-shrink-0 mt-1">

                          <div key={d} className={`w-2.5 h-2.5 rounded-full ${d <= cr[2] ? 'bg-amber-400' : 'bg-slate-200'}`}></div>

                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex flex-wrap gap-5 text-xs text-slate-500">
        <span className="flex items-center gap-1.5">🔒 <strong>Seuil obligatoire</strong> — requis pour valider le niveau</span>

          </div>

        iconSize:[48,48], iconAnchor:[24,24], popupAnchor:[0,-20],

      const marker = L.marker([zoo.lat, zoo.lng], { icon }).addTo(map);

      div.innerHTML = `
        <div class="font-bold text-slate-800 text-sm mb-0.5">${zoo.name}</div>

          <div key={lv} className={`bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-l-8 ${lc.bdCls} hover:shadow-md transition-shadow`}>
            <div className="flex items-center gap-3 mb-2">
              <div className={`${lc.txtCls} text-2xl`}><i className={`fa-solid ${lc.icon}`}></i></div>
              <h3 className="font-display font-bold text-xl text-slate-800">Niveau {lv} : {lc.title}</h3>
              <span className={`ml-auto text-xs font-bold px-2 py-1 rounded-full ${lc.lightCls} ${lc.txtCls}`}>{thr}</span>
            </div>
            <div className="text-amber-400 mb-3 tracking-widest text-sm">{'⭐'.repeat(lv)}</div>
            <p className="text-slate-600 text-sm leading-relaxed">{desc}</p>
            <div className="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-500">
              <i className="fa-solid fa-lock text-xs mr-1.5"></i>
              <strong>{SEUILS_N[lv]} critère{SEUILS_N[lv]>1?'s':''} seuil</strong> obligatoire{SEUILS_N[lv]>1?'s':''} spécifiques à ce niveau
            </div>
          </div>
        );
      })}
    </div>

    {/* Threshold note */}
    <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 flex items-start gap-3 mb-2">
      <i className="fa-solid fa-circle-info text-amber-500 text-lg mt-0.5 flex-shrink-0"></i>
      <p className="text-amber-800 text-sm leading-relaxed">
        Les niveaux sont <strong>cumulatifs</strong> : pour obtenir le Niveau 3, tous les critères-seuils des niveaux 1, 2 <em>et</em> 3 doivent être atteints (score ≥ 2/3), et le score global doit dépasser 60%.
      </p>
    </div>

    {/* Full criteria explorer */}
    <CriteriaExplorer />
  </div>
);

// ══════════════════════════════════════════════════════════
//  APP ROOT
// ══════════════════════════════════════════════════════════
const App = () => {
  const [activeTab,    setTab]         = useState('home');
  const [selectedZoo,  setSelectedZoo] = useState(null);

  // Allow zoo cards on homepage to open modal
  useEffect(() => {
    const handler = e => setSelectedZoo(e.detail);
    document.addEventListener('openZoo', handler);
    return () => document.removeEventListener('openZoo', handler);
  }, []);

  return (
    <div className="min-h-screen flex flex-col">
      <Navigation activeTab={activeTab} setTab={setTab} />
      <main className="flex-grow">
        {activeTab === 'home'    && <HomePage    setTab={setTab} />}
        {activeTab === 'map'     && <MapPage     setSelectedZoo={setSelectedZoo} />}
        {activeTab === 'project' && <ProjectPage />}
        {activeTab === 'grid'    && <GridPage />}
      </main>
      <footer className="bg-slate-900 text-slate-400 py-8 text-center border-t border-slate-800 mt-12">
        <div className="max-w-4xl mx-auto px-4">
          <p className="font-display text-emerald-400 text-lg mb-1"><i className="fa-solid fa-paw mr-2"></i>Label Voix Animale</p>
          <p className="text-sm">Projet Étudiant RSE © 2026 · Une démarche constructive pour le bien-être animal.</p>
        </div>
      </footer>
      <Modal zoo={selectedZoo} onClose={() => setSelectedZoo(null)} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
