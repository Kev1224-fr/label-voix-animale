const ScorecardTab=({zoo})=>{
  const [show,setShow]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShow(true),80);return()=>clearTimeout(t);},[]);
  const lc=LVL[zoo.level];
  return(
    <div className="space-y-7 fade-in">
      <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100">
        <div className="flex justify-between items-end mb-3">
          <div>
            <div className="text-xs uppercase tracking-widest text-slate-400 mb-0.5">Score global pondéré</div>
            <div className={`font-display text-4xl font-bold ${lc.txtCls}`}>{zoo.globalPct}%</div>
          </div>
          <div className={`${lc.colorCls} text-white px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1.5`}>
            <i className={`fa-solid ${lc.icon}`}/> {lc.title}
          </div>
        </div>
        <div className="bar-track">
          <div className="bar-fill" style={{width:show?`${zoo.globalPct}%`:'0%',backgroundColor:pctColor(zoo.globalPct)}}/>
        </div>
        <div className="flex justify-between text-xs text-slate-400 mt-1.5">
          <span>0%</span><span>Niv.2: 40%</span><span>Niv.3: 60%</span><span>Niv.4: 80%</span><span>100%</span>
        </div>
      </div>

      <div>
        <div className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Scores par catégorie</div>
        <div className="space-y-2.5">
          {CATS.map((cat,i)=>{
            const pct=zoo.catPcts[cat.id];
            return(
              <div key={cat.id} className="flex items-center gap-3">
                <div className={`w-7 h-7 rounded-lg flex items-center justify-center text-xs flex-shrink-0 ${cat.bg} ${cat.txt}`}>
                  <i className={`fa-solid ${cat.icon}`}/>
                </div>
                <span className="text-xs text-slate-600 w-36 flex-shrink-0 truncate">{cat.name}</span>
                <div className="bar-track flex-1">
                  <div className="bar-fill" style={{width:show?`${pct}%`:'0%',backgroundColor:cat.bar,transitionDelay:`${i*80}ms`}}/>
                </div>
                <span className="text-xs font-bold text-slate-700 w-9 text-right flex-shrink-0">{pct}%</span>
              </div>
            );
          })}
        </div>
      </div>

      <div>
        <div className="text-xs font-bold uppercase tracking-widest text-slate-400 mb-3">Validation des seuils obligatoires</div>
        <div className="space-y-2">
          {[1,2,3,4].map(lv=>{
            const [passed,total]=zoo.seuils[lv];
            const scoreOk=zoo.globalPct>=SCORE_THR[lv];
            const seuilOk=passed===total;
            const allOk=seuilOk&&scoreOk;
            const l=LVL[lv];
            return(
              <div key={lv} className={`flex items-center gap-3 p-3 rounded-xl border ${allOk?'bg-emerald-50 border-emerald-200':'bg-slate-50 border-slate-200'}`}>
                <div className={`w-8 h-8 rounded-full ${l.colorCls} flex items-center justify-center flex-shrink-0`}>
                  <i className={`fa-solid ${l.icon} text-white text-xs`}/>
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-bold text-slate-800">Niveau {lv} – {l.title}</div>
                  <div className="text-xs text-slate-500">
                    {passed}/{total} seuils · Score ≥{SCORE_THR[lv]}%:&nbsp;
                    <span className={scoreOk?'text-emerald-600 font-semibold':'text-red-500 font-semibold'}>{zoo.globalPct}%</span>
                  </div>
                </div>
                <div className="flex gap-1.5 flex-shrink-0">
                  <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs ${seuilOk?'bg-emerald-100 text-emerald-600':'bg-red-100 text-red-500'}`}>
                    <i className={`fa-solid ${seuilOk?'fa-lock-open':'fa-lock'}`}/>
                  </span>
                  <span className={`w-7 h-7 rounded-full flex items-center justify-center text-xs ${scoreOk?'bg-emerald-100 text-emerald-600':'bg-red-100 text-red-500'}`}>
                    <i className={`fa-solid ${scoreOk?'fa-check':'fa-xmark'}`}/>
                  </span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className={`${lc.lightCls} border-l-4 ${lc.bdCls} p-4 rounded-r-xl`}>
        <div className="flex items-center gap-2 mb-1.5">
          <i className={`fa-solid ${lc.icon} ${lc.txtCls} text-lg`}/>
          <span className={`font-bold text-sm ${lc.txtCls}`}>Label attribué : {lc.title}</span>
        </div>
        <p className="text-xs text-slate-600 leading-relaxed">{lc.desc}</p>
      </div>
    </div>
  );
};

  const lvCrits=CRIT.filter(c=>c[1]===activeLv);

    <div className="mt-10 bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">

              <span className="text-slate-400 font-normal">{cnt} crit. · {sn} seuils</span>

/* ═══════════════════════════════════════════════════════════
   MAP PAGE — clic direct + filtre par niveau
═══════════════════════════════════════════════════════════ */
const MapPage=({openZoo})=>{
  const [levelFilter,setLevelFilter]=useState('all');
  const mapRef=useRef(null);
  const markersRef=useRef([]);
  const openZooRef=useRef(openZoo);
  useEffect(()=>{openZooRef.current=openZoo;},[openZoo]);

  // Init map once on mount
  useEffect(()=>{
    // Wait a tick so the DOM element is fully laid out
    const timer=setTimeout(()=>{
      if(mapRef.current) return; // already init
      const container=document.getElementById('map-container');
      if(!container) return;
      const m=L.map(container,{zoomControl:true,scrollWheelZoom:true});
      m.setView([48.5,6.0],5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom:18,
      }).addTo(m);
      mapRef.current=m;
      // Force Leaflet to recalculate container size
      setTimeout(()=>m.invalidateSize(),100);
    },50);
    return()=>{
      clearTimeout(timer);
      if(mapRef.current){mapRef.current.remove();mapRef.current=null;}
    };
  },[]);

  // Update markers when filter changes (after map is ready)
  useEffect(()=>{
    const update=()=>{
      if(!mapRef.current) return;
      markersRef.current.forEach(m=>m.remove());
      markersRef.current=[];
      const visible=levelFilter==='all'?ZOOS:ZOOS.filter(z=>z.level===parseInt(levelFilter));
      visible.forEach(zoo=>{
        const bgColor=pctColor(zoo.globalPct);
        const icon=L.divIcon({
          className:'custom-leaflet-icon',
          html:`<div style="position:relative;width:50px;height:50px;cursor:pointer">
            <div style="width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
              border:3px solid white;box-shadow:0 6px 18px rgba(0,0,0,.32);font-size:22px;background:white">${zoo.flag}</div>
            <div style="position:absolute;bottom:1px;right:1px;width:18px;height:18px;border-radius:50%;
              display:flex;align-items:center;justify-content:center;font-size:9px;color:white;font-weight:bold;
              border:2px solid white;background:${bgColor}">${zoo.level}</div>
          </div>`,
          iconSize:[50,50],iconAnchor:[25,25],
        });
        const marker=L.marker([zoo.lat,zoo.lng],{icon}).addTo(mapRef.current);
        marker.on('click',()=>openZooRef.current(zoo));
        marker.bindTooltip(
          `<strong style="font-size:12px">${zoo.short}</strong><br/><span style="color:#64748b;font-size:11px">${zoo.flag} ${zoo.city} · <strong style="color:${bgColor}">${zoo.globalPct}%</strong></span>`,
          {direction:'top',offset:[0,-28],className:'leaflet-tooltip-custom'}
        );
        markersRef.current.push(marker);
      });
    };
    // If map not yet ready, retry
    if(mapRef.current) update();
    else { const t=setTimeout(update,300); return()=>clearTimeout(t); }
  },[levelFilter]);

  return(
    <div className="fade-in max-w-6xl mx-auto px-4 py-12">
      <div className="text-center mb-8">
        <h2 className="font-display text-3xl font-bold text-slate-800 mb-2">Carte des 12 Parcs Évalués</h2>
        <p className="text-slate-500 max-w-2xl mx-auto mb-6 text-sm">
          <i className="fa-solid fa-hand-pointer mr-1.5 text-emerald-600"/>
          Cliquez directement sur un marqueur pour ouvrir l'évaluation complète du parc.
        </p>
        {/* Filter buttons */}
        <div className="flex flex-wrap justify-center gap-2.5">
          <button onClick={()=>setLevelFilter('all')}
            className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold border transition-all
              ${levelFilter==='all'?'bg-slate-800 text-white border-slate-800 shadow':'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`}>
            <i className="fa-solid fa-layer-group text-[10px]"/> Tous les parcs ({ZOOS.length})
          </button>
          {[4,3,2,1].map(lv=>{
            const lc=LVL[lv];const cnt=ZOOS.filter(z=>z.level===lv).length;const act=levelFilter===String(lv);
            return(
              <button key={lv} onClick={()=>setLevelFilter(act?'all':String(lv))}
                className={`flex items-center gap-1.5 px-4 py-2 rounded-full text-xs font-bold border transition-all
                  ${act?`${lc.colorCls} text-white border-transparent shadow-md`:`bg-white ${lc.txtCls} border-slate-200 hover:shadow-sm`}`}>
                <i className={`fa-solid ${lc.icon} text-[10px]`}/>
                Niv.{lv} – {lc.title}
                <span className={`font-normal ${act?'text-white/70':'text-slate-400'}`}>({cnt})</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="bg-white p-2 rounded-3xl shadow-xl border border-slate-200">
        <div id="map-container" style={{width:'100%',height:'560px',borderRadius:'1rem'}}/>
      </div>
      <p className="text-center text-xs text-slate-400 mt-3">
        <i className="fa-solid fa-circle-info mr-1"/>
        Clic = ouvre la fiche · Survol = aperçu rapide · Badge coloré = niveau de label
      </p>
    </div>
  );
};
